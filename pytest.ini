[tool:pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = 
    --verbose
    --cov=kungfu_chess
    --cov-report=term-missing
    --cov-report=html:htmlcov
    --cov-fail-under=90
    --asyncio-mode=auto
markers =
    asyncio: mark test as async
    integration: mark test as integration test
    slow: mark test as slow running